<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Кликер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #ffffff;
            font-family: 'Segoe UI', system-ui, 'Roboto', 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            touch-action: pan-y pinch-zoom;
            transition: transform 0.1s cubic-bezier(0.2, 1.2, 0.8, 1);
        }

        body.shake-effect {
            animation: screenShake 0.15s cubic-bezier(0.25, 1.5, 0.5, 1) 2;
        }

        @keyframes screenShake {
            0% { transform: translateX(0px) rotate(0deg); }
            25% { transform: translateX(12px) rotate(1deg); }
            75% { transform: translateX(-10px) rotate(-1deg); }
            100% { transform: translateX(0px) rotate(0deg); }
        }

        .game-container {
            max-width: 1400px;
            width: 100%;
            background: white;
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            align-items: stretch;
        }

        .upgrades-panel {
            flex: 1;
            min-width: 260px;
            background: #fef9f9;
            border-radius: 40px;
            padding: 24px 20px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.03);
            border: 1px solid #ffe2e7;
            touch-action: manipulation;
        }

        .upgrades-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: #ff4d6d;
            text-align: center;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .upgrade-card {
            background: white;
            border-radius: 32px;
            padding: 18px 20px;
            margin-bottom: 20px;
            border: 1px solid #ffcdd6;
            transition: transform 0.2s ease;
        }

        .upgrade-card:hover {
            transform: translateY(-3px);
        }

        .upgrade-name {
            font-size: 1.5rem;
            font-weight: 800;
            color: #e63946;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .upgrade-desc {
            font-size: 0.9rem;
            color: #6c5b5f;
            margin-bottom: 16px;
            padding-left: 12px;
            border-left: 3px solid #ffb3c1;
        }

        .upgrade-stats {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            font-size: 0.95rem;
            margin-bottom: 16px;
            background: #fff0f2;
            padding: 8px 14px;
            border-radius: 60px;
        }

        .upgrade-price {
            font-weight: 800;
            color: #d90429;
            background: white;
            padding: 4px 12px;
            border-radius: 40px;
        }

        .upgrade-level {
            font-weight: 700;
            color: #2b2d42;
        }

        .buy-btn {
            width: 100%;
            background: #ff4d6d;
            border: none;
            border-radius: 60px;
            padding: 12px 0;
            font-size: 1.2rem;
            font-weight: 700;
            color: white;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 4px 10px rgba(255, 77, 109, 0.2);
            touch-action: manipulation;
        }

        .buy-btn:active {
            transform: scale(0.96);
            background: #e6003a;
        }

        .buy-btn.disabled {
            background: #d4a5b0;
            cursor: not-allowed;
            opacity: 0.6;
            transform: none;
        }

        .center-panel {
            flex: 1.5;
            min-width: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 28px;
        }

        .stats {
            background: #fef5f7;
            border-radius: 60px;
            padding: 24px 30px;
            width: 100%;
            text-align: center;
            border: 1px solid #ffe0e5;
        }

        .clicks-count {
            font-size: 4rem;
            font-weight: 900;
            color: #1e1e2f;
            line-height: 1.2;
            margin-bottom: 12px;
            display: flex;
            align-items: baseline;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .clicks-count span:first-child {
            font-size: 4rem;
        }

        .clicks-label {
            font-size: 1.5rem;
            font-weight: 600;
            color: #ff4d6d;
            background: #fff0f2;
            padding: 2px 16px;
            border-radius: 60px;
        }

        .cps-count {
            font-size: 1.8rem;
            font-weight: 700;
            color: #4a4e69;
            background: white;
            display: inline-block;
            padding: 8px 24px;
            border-radius: 80px;
        }

        .cps-label {
            font-size: 1rem;
            font-weight: 600;
            color: #e63946;
            margin-right: 8px;
        }

        .love-button {
            background-color: #ff4d6d;
            border: none;
            border-radius: 100px;
            padding: 1.6rem 2rem;
            font-size: 3.2rem;
            font-weight: 800;
            font-family: inherit;
            color: white;
            cursor: pointer;
            box-shadow: 0 30px 40px -12px rgba(0, 0, 0, 0.3);
            transition: transform 0.08s linear, background-color 0.3s ease;
            text-align: center;
            width: 100%;
            letter-spacing: 0.02em;
            white-space: nowrap;
            touch-action: manipulation;
        }

        .love-button:active {
            transform: scale(0.96);
        }

        .coming-soon-panel {
            flex: 1;
            min-width: 260px;
            background: linear-gradient(145deg, #f5f3ff 0%, #edeaff 100%);
            border-radius: 40px;
            padding: 24px 20px;
            border: 2px dashed #c4b5fd;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 20px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.03);
        }

        .lock-icon {
            font-size: 5rem;
            filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.1));
            animation: gentleFloat 2s ease-in-out infinite;
        }

        @keyframes gentleFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        .soon-title {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #8b5cf6, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .soon-text {
            font-size: 1rem;
            color: #6b7280;
            line-height: 1.5;
            background: rgba(139, 92, 246, 0.1);
            padding: 12px 16px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
        }

        .sparkles {
            font-size: 1.5rem;
            letter-spacing: 8px;
            opacity: 0.7;
        }

        @media (max-width: 900px) {
            .game-container {
                flex-direction: column;
            }
            .upgrades-panel, .center-panel, .coming-soon-panel {
                width: 100%;
            }
            .love-button {
                font-size: 2.4rem;
                padding: 1rem 1.5rem;
                white-space: nowrap;
            }
            .clicks-count {
                font-size: 2.8rem;
            }
            .clicks-count span:first-child {
                font-size: 2.8rem;
            }
            .clicks-label {
                font-size: 1.1rem;
                padding: 2px 12px;
            }
            .cps-count {
                font-size: 1.4rem;
                padding: 5px 18px;
            }
            .upgrades-panel, .coming-soon-panel {
                min-width: auto;
            }
        }

        @media (max-width: 480px) {
            .love-button {
                font-size: 2rem;
                padding: 0.9rem 1rem;
                white-space: nowrap;
            }
            .clicks-count {
                font-size: 2.2rem;
            }
            .clicks-count span:first-child {
                font-size: 2.2rem;
            }
            .soon-title {
                font-size: 1.5rem;
            }
            .lock-icon {
                font-size: 3.5rem;
            }
        }

        .heart-float {
            position: fixed;
            pointer-events: none;
            font-size: 1.8rem;
            z-index: 9999;
            filter: drop-shadow(0 0 3px #ff4d6d);
            animation: floatUpFade 0.8s ease-out forwards;
        }

        @keyframes floatUpFade {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.6);
            }
            100% {
                opacity: 0;
                transform: translate(calc(-50% + var(--dx, 0px)), calc(-50% - 90px)) scale(1.2);
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="upgrades-panel">
        <div class="upgrades-title">
            <span>✨</span> Улучшения <span>💖</span>
        </div>
        <div class="upgrade-card">
            <div class="upgrade-name">
                <span>🤝</span> Сила клика
            </div>
            <div class="upgrade-desc">
                Каждое нажатие приносит на +1 клик больше.
            </div>
            <div class="upgrade-stats">
                <span class="upgrade-level" id="clickUpgradeLevel">Уровень: 0</span>
                <span class="upgrade-price" id="clickUpgradePrice">200 ❤️</span>
            </div>
            <button class="buy-btn" id="buyClickUpgradeBtn">Купить</button>
        </div>

        <div class="upgrade-card">
            <div class="upgrade-name">
                <span>⏲️</span> Автокликер
            </div>
            <div class="upgrade-desc">
                Пассивно приносит +1 клик в секунду.
            </div>
            <div class="upgrade-stats">
                <span class="upgrade-level" id="cpsUpgradeLevel">Уровень: 0</span>
                <span class="upgrade-price" id="cpsUpgradePrice">200 ❤️</span>
            </div>
            <button class="buy-btn" id="buyCpsUpgradeBtn">Купить</button>
        </div>
        <div style="margin-top: 8px; font-size: 0.75rem; text-align: center; color:#b98f99;">
            💡 Цена удваивается после каждой покупки
        </div>
    </div>

    <div class="center-panel">
        <div class="stats">
            <div class="clicks-count">
                <span id="totalClicks">0</span>
                <span class="clicks-label">кликов</span>
            </div>
            <div class="cps-count">
                <span class="cps-label">⚡ кликов/сек</span>
                <span id="clicksPerSec">0</span>
            </div>
        </div>
        <button class="love-button" id="mainLoveBtn">Клик</button>
    </div>

    <div class="coming-soon-panel">
        <div class="lock-icon">🔒</div>
        <div class="soon-title">Скоро</div>
        <div class="soon-text">
            ✨ Обновление готовится ✨<br>
            Тут появятся новые возможности...
        </div>
        <div class="sparkles">⭐️⭐️⭐️</div>
    </div>
</div>

<script>
    let totalClicks = 0;
    let clickBonus = 0;
    let passiveIncome = 0;
    let clickUpgradeLevel = 0;
    let cpsUpgradeLevel = 0;
    let currentClickPrice = 200;
    let currentCpsPrice = 200;
    let clickTimestamps = [];
    let audioContext = null;
    let musicBuffer = null;
    let isMusicPlaying = false;
    let musicSource = null;
    
    const totalSpan = document.getElementById('totalClicks');
    const cpsSpan = document.getElementById('clicksPerSec');
    const clickUpgradeLevelSpan = document.getElementById('clickUpgradeLevel');
    const clickUpgradePriceSpan = document.getElementById('clickUpgradePrice');
    const cpsUpgradeLevelSpan = document.getElementById('cpsUpgradeLevel');
    const cpsUpgradePriceSpan = document.getElementById('cpsUpgradePrice');
    const buyClickBtn = document.getElementById('buyClickUpgradeBtn');
    const buyCpsBtn = document.getElementById('buyCpsUpgradeBtn');
    const mainBtn = document.getElementById('mainLoveBtn');
    
    const rainbowColors = ['#FF0000', '#FF7F00', '#FFFF00', '#00FF00', '#0000FF', '#4B0082', '#9400D3'];
    let lastColorIndex = -1;
    
    function initAudio() {
        if (!audioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            createBackgroundMusic();
        }
        if (audioContext.state === 'suspended') {
            audioContext.resume();
        }
    }
    
    function createBackgroundMusic() {
        const sampleRate = audioContext.sampleRate;
        const duration = 12;
        const length = sampleRate * duration;
        const buffer = audioContext.createBuffer(2, length, sampleRate);
        
        for (let ch = 0; ch < 2; ch++) {
            const data = buffer.getChannelData(ch);
            for (let i = 0; i < length; i++) {
                const t = i / sampleRate;
                let value = 0;
                const chords = [
                    { notes: [261.63, 329.63, 392.00], start: 0, length: 4 },
                    { notes: [293.66, 349.23, 440.00], start: 4, length: 4 },
                    { notes: [329.63, 392.00, 493.88], start: 8, length: 4 }
                ];
                
                for (const chord of chords) {
                    if (t >= chord.start && t < chord.start + chord.length) {
                        for (const freq of chord.notes) {
                            value += Math.sin(2 * Math.PI * freq * t) * 0.12;
                        }
                    }
                }
                const melody = Math.sin(2 * Math.PI * 523.25 * t) * 0.08 * Math.sin(2 * Math.PI * 1.5 * t);
                value += melody;
                const bass = Math.sin(2 * Math.PI * 130.81 * t) * 0.1 * (Math.sin(2 * Math.PI * 1 * t) * 0.5 + 0.5);
                value += bass;
                const envelope = Math.exp(-t * 0.3) * 0.8 + 0.2;
                const lfo = Math.sin(2 * Math.PI * 0.4 * t) * 0.04;
                data[i] = (value + lfo) * envelope * 0.5;
            }
        }
        musicBuffer = buffer;
    }
    
    function playBackgroundMusic() {
        if (!audioContext || !musicBuffer) return;
        if (musicSource) {
            try {
                musicSource.stop();
            } catch(e) {}
        }
        musicSource = audioContext.createBufferSource();
        musicSource.buffer = musicBuffer;
        musicSource.loop = true;
        const gainNode = audioContext.createGain();
        gainNode.gain.value = 0.28;
        musicSource.connect(gainNode);
        gainNode.connect(audioContext.destination);
        musicSource.start();
        isMusicPlaying = true;
    }
    
    function playClickSound() {
        if (!audioContext) {
            initAudio();
        }
        if (!audioContext) return;
        const now = audioContext.currentTime;
        const gainNode = audioContext.createGain();
        gainNode.gain.value = 0.1;
        gainNode.connect(audioContext.destination);
        
        const osc = audioContext.createOscillator();
        osc.frequency.value = 880;
        osc.type = 'triangle';
        osc.connect(gainNode);
        osc.start();
        
        const osc2 = audioContext.createOscillator();
        osc2.frequency.value = 440;
        osc2.type = 'sine';
        osc2.connect(gainNode);
        osc2.start(now + 0.02);
        
        gainNode.gain.exponentialRampToValueAtTime(0.00001, now + 0.12);
        osc.stop(now + 0.1);
        osc2.stop(now + 0.12);
    }
    
    function playPurchaseSound() {
        if (!audioContext) {
            initAudio();
        }
        if (!audioContext) return;
        const now = audioContext.currentTime;
        const gainNode = audioContext.createGain();
        gainNode.gain.value = 0.18;
        gainNode.connect(audioContext.destination);
        
        const notes = [523.25, 659.25, 783.99, 1046.50];
        notes.forEach((freq, index) => {
            const osc = audioContext.createOscillator();
            osc.frequency.value = freq;
            osc.type = 'sine';
            osc.connect(gainNode);
            osc.start(now + index * 0.08);
            osc.stop(now + index * 0.08 + 0.2);
        });
        
        gainNode.gain.exponentialRampToValueAtTime(0.00001, now + 0.5);
    }
    
    function getRandomRainbowColor() {
        let newIndex;
        do {
            newIndex = Math.floor(Math.random() * rainbowColors.length);
        } while (newIndex === lastColorIndex && rainbowColors.length > 1);
        lastColorIndex = newIndex;
        return rainbowColors[newIndex];
    }
    
    function updateCPSDisplay() {
        const now = Date.now();
        clickTimestamps = clickTimestamps.filter(ts => now - ts < 1000);
        const activeCPS = clickTimestamps.length;
        const totalCPS = passiveIncome + activeCPS;
        cpsSpan.innerText = totalCPS;
    }
    
    function saveGame() {
        const saveData = {
            totalClicks: totalClicks,
            clickBonus: clickBonus,
            passiveIncome: passiveIncome,
            clickUpgradeLevel: clickUpgradeLevel,
            cpsUpgradeLevel: cpsUpgradeLevel,
            currentClickPrice: currentClickPrice,
            currentCpsPrice: currentCpsPrice
        };
        localStorage.setItem('clickerSave', JSON.stringify(saveData));
    }
    
    function loadGame() {
        const saved = localStorage.getItem('clickerSave');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                totalClicks = data.totalClicks || 0;
                clickBonus = data.clickBonus || 0;
                passiveIncome = data.passiveIncome || 0;
                clickUpgradeLevel = data.clickUpgradeLevel || 0;
                cpsUpgradeLevel = data.cpsUpgradeLevel || 0;
                currentClickPrice = data.currentClickPrice || 200;
                currentCpsPrice = data.currentCpsPrice || 200;
            } catch(e) {}
        }
    }
    
    function addClicks(baseAmount = 1, fromPassive = false) {
        if (!fromPassive) {
            clickTimestamps.push(Date.now());
            updateCPSDisplay();
            playClickSound();
        }
        let gained = baseAmount;
        if (!fromPassive) {
            gained = baseAmount + clickBonus;
        }
        totalClicks += gained;
        updateUI();
        updateCPSDisplay();
        saveGame();
        return gained;
    }
    
    function updateUI() {
        totalSpan.innerText = Math.floor(totalClicks);
        clickUpgradeLevelSpan.innerText = `Уровень: ${clickUpgradeLevel}`;
        cpsUpgradeLevelSpan.innerText = `Уровень: ${cpsUpgradeLevel}`;
        clickUpgradePriceSpan.innerText = `${currentClickPrice} ❤️`;
        cpsUpgradePriceSpan.innerText = `${currentCpsPrice} ❤️`;
        
        if (totalClicks >= currentClickPrice) {
            buyClickBtn.classList.remove('disabled');
            buyClickBtn.disabled = false;
        } else {
            buyClickBtn.classList.add('disabled');
            buyClickBtn.disabled = true;
        }
        
        if (totalClicks >= currentCpsPrice) {
            buyCpsBtn.classList.remove('disabled');
            buyCpsBtn.disabled = false;
        } else {
            buyCpsBtn.classList.add('disabled');
            buyCpsBtn.disabled = true;
        }
    }
    
    function buyClickUpgrade() {
        if (totalClicks >= currentClickPrice) {
            totalClicks -= currentClickPrice;
            clickUpgradeLevel++;
            clickBonus = clickUpgradeLevel;
            currentClickPrice *= 2;
            updateUI();
            saveGame();
            playPurchaseSound();
            showFloatingMessage("✨ +1 к силе клика ✨", "#e63946");
        } else {
            showFloatingMessage("💔 Не хватает кликов 💔", "#b0003a");
        }
    }
    
    function buyCpsUpgrade() {
        if (totalClicks >= currentCpsPrice) {
            totalClicks -= currentCpsPrice;
            cpsUpgradeLevel++;
            passiveIncome = cpsUpgradeLevel;
            currentCpsPrice *= 2;
            updateUI();
            saveGame();
            playPurchaseSound();
            showFloatingMessage("💓 +1 клик/сек 💓", "#2a9d8f");
        } else {
            showFloatingMessage("💔 Не хватает кликов 💔", "#b0003a");
        }
    }
    
    function showFloatingMessage(msg, color) {
        const div = document.createElement('div');
        div.innerText = msg;
        div.style.position = 'fixed';
        div.style.bottom = '30%';
        div.style.left = '50%';
        div.style.transform = 'translateX(-50%)';
        div.style.backgroundColor = 'rgba(0,0,0,0.8)';
        div.style.color = color;
        div.style.padding = '10px 22px';
        div.style.borderRadius = '50px';
        div.style.fontWeight = 'bold';
        div.style.fontSize = '1.1rem';
        div.style.zIndex = '10000';
        div.style.whiteSpace = 'nowrap';
        div.style.backdropFilter = 'blur(6px)';
        div.style.fontFamily = 'inherit';
        div.style.pointerEvents = 'none';
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 900);
    }
    
    function createHeartExplosion(clientX, clientY) {
        const heartsCount = Math.floor(Math.random() * 5) + 3;
        for (let i = 0; i < heartsCount; i++) {
            const heart = document.createElement('div');
            heart.classList.add('heart-float');
            const icons = ['❤️', '💖', '💗', '💓', '💕', '💘'];
            heart.innerText = icons[Math.floor(Math.random() * icons.length)];
            const size = Math.random() * 24 + 18;
            heart.style.fontSize = `${size}px`;
            const offX = (Math.random() - 0.5) * 70;
            const offY = (Math.random() - 0.5) * 50;
            heart.style.left = `${clientX + offX}px`;
            heart.style.top = `${clientY + offY}px`;
            heart.style.setProperty('--dx', `${(Math.random() - 0.5) * 60}px`);
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 800);
        }
    }
    
    let rainbowInterval = null;
    
    function startRainbowTimer() {
        if (rainbowInterval) clearInterval(rainbowInterval);
        rainbowInterval = setInterval(() => {
            const newColor = getRandomRainbowColor();
            mainBtn.style.backgroundColor = newColor;
            showFloatingMessage("🌈 РАДУГА! 🌈", "#ff4d6d");
        }, 30000);
    }
    
    function checkAndShake() {
        const clickCount = Math.floor(totalClicks);
        if (clickCount === 67 || clickCount === 167 || clickCount === 267 || clickCount === 367 || clickCount === 467 || clickCount === 567 || clickCount === 667 || clickCount === 767 || clickCount === 867 || clickCount === 967 || clickCount === 1067 || clickCount === 1167 || clickCount === 1267 || clickCount === 1367) {
            document.body.classList.add('shake-effect');
            setTimeout(() => {
                document.body.classList.remove('shake-effect');
            }, 400);
        }
    }
    
    let lastShakeValue = Math.floor(totalClicks);
    function monitorShake() {
        const current = Math.floor(totalClicks);
        if (current !== lastShakeValue) {
            checkAndShake();
            lastShakeValue = current;
        }
    }
    
    function onMainTap(event) {
        let clientX, clientY;
        if (event.touches) {
            const touch = event.touches[0];
            clientX = touch.clientX;
            clientY = touch.clientY;
            event.preventDefault();
        } else {
            clientX = event.clientX;
            clientY = event.clientY;
        }
        
        initAudio();
        if (!isMusicPlaying && audioContext && audioContext.state === 'running') {
            playBackgroundMusic();
        }
        
        const gained = addClicks(1, false);
        createHeartExplosion(clientX, clientY);
        monitorShake();
        
        if (window.navigator && window.navigator.vibrate) {
            window.navigator.vibrate(30);
        }
        
        const plus = document.createElement('div');
        plus.innerText = `+${gained}`;
        plus.style.position = 'fixed';
        plus.style.left = `${clientX - 15}px`;
        plus.style.top = `${clientY - 35}px`;
        plus.style.fontSize = '1.7rem';
        plus.style.fontWeight = 'bold';
        plus.style.color = '#ff4d6d';
        plus.style.textShadow = '0 0 5px white';
        plus.style.pointerEvents = 'none';
        plus.style.zIndex = '9998';
        plus.style.transition = 'transform 0.3s ease-out, opacity 0.4s';
        document.body.appendChild(plus);
        setTimeout(() => {
            plus.style.transform = 'translateY(-40px)';
            plus.style.opacity = '0';
            setTimeout(() => plus.remove(), 400);
        }, 10);
    }
    
    let passiveInterval = null;
    function startPassiveIncome() {
        if (passiveInterval) clearInterval(passiveInterval);
        passiveInterval = setInterval(() => {
            if (passiveIncome > 0) {
                totalClicks += passiveIncome;
                updateUI();
                updateCPSDisplay();
                saveGame();
                monitorShake();
            }
        }, 1000);
    }
    
    function initGame() {
        loadGame();
        updateUI();
        updateCPSDisplay();
        startPassiveIncome();
        startRainbowTimer();
        
        mainBtn.style.backgroundColor = '#ff4d6d';
        lastColorIndex = -1;
        lastShakeValue = Math.floor(totalClicks);
        checkAndShake();
        
        buyClickBtn.onclick = (e) => {
            e.stopPropagation();
            buyClickUpgrade();
        };
        buyCpsBtn.onclick = (e) => {
            e.stopPropagation();
            buyCpsUpgrade();
        };
        
        mainBtn.onclick = (e) => {
            onMainTap(e);
        };
        mainBtn.ontouchstart = (e) => {
            e.preventDefault();
            onMainTap(e);
        };
        
        setInterval(() => {
            updateCPSDisplay();
            monitorShake();
        }, 300);
    }
    
    initGame();
</script>
</body>
</html>
