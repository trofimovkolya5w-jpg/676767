<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Кликер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #fff9f0 0%, #ffe6d5 100%);
            font-family: 'Segoe UI', system-ui, 'Roboto', 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            touch-action: pan-y pinch-zoom;
        }

        .game-container {
            max-width: 1400px;
            width: 100%;
            background: rgba(255, 248, 240, 0.7);
            backdrop-filter: blur(2px);
            border-radius: 60px;
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
        }

        .upgrades-panel {
            flex: 1;
            min-width: 260px;
            background: #fffef7;
            border-radius: 40px;
            padding: 24px 20px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.05);
            border: 1px solid #ffe0c4;
            touch-action: manipulation;
            align-self: stretch;
        }

        .upgrades-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }

        .upgrades-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: #e87c5e;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .settings-btn {
            background: #e87c5e;
            border: none;
            border-radius: 50px;
            width: 44px;
            height: 44px;
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 4px 10px rgba(232, 124, 94, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: inherit;
        }

        .settings-btn:active {
            transform: scale(0.95);
            background: #d46242;
        }

        .upgrade-card {
            background: white;
            border-radius: 32px;
            padding: 18px 20px;
            margin-bottom: 20px;
            border: 1px solid #ffd9b5;
            transition: transform 0.2s ease;
        }

        .upgrade-card:hover {
            transform: translateY(-3px);
        }

        .upgrade-name {
            font-size: 1.5rem;
            font-weight: 800;
            color: #e87c5e;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .upgrade-desc {
            font-size: 0.9rem;
            color: #9b7b6b;
            margin-bottom: 16px;
            padding-left: 12px;
            border-left: 3px solid #ffc8a2;
        }

        .upgrade-stats {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            font-size: 0.95rem;
            margin-bottom: 16px;
            background: #fff4ea;
            padding: 8px 14px;
            border-radius: 60px;
        }

        .upgrade-price {
            font-weight: 800;
            color: #e87c5e;
            background: white;
            padding: 4px 12px;
            border-radius: 40px;
        }

        .upgrade-level {
            font-weight: 700;
            color: #5a4a42;
        }

        .buy-btn {
            width: 100%;
            background: #e87c5e;
            border: none;
            border-radius: 60px;
            padding: 12px 0;
            font-size: 1.2rem;
            font-weight: 700;
            color: white;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 4px 10px rgba(232, 124, 94, 0.2);
            touch-action: manipulation;
        }

        .buy-btn:active {
            transform: scale(0.96);
            background: #d46242;
        }

        .buy-btn.disabled {
            background: #d4b5a8;
            cursor: not-allowed;
            opacity: 0.6;
            transform: none;
        }

        .center-panel {
            flex: 1.5;
            min-width: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            gap: 30px;
            padding-top: 20px;
        }

        .stats {
            background: #fffef7;
            border-radius: 60px;
            padding: 20px 30px;
            width: 100%;
            text-align: center;
            border: 1px solid #ffe0c4;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.03);
        }

        .clicks-count {
            font-size: 3.5rem;
            font-weight: 900;
            color: #4a3b33;
            line-height: 1.2;
            margin-bottom: 10px;
            display: flex;
            align-items: baseline;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .clicks-count span:first-child {
            font-size: 3.5rem;
        }

        .clicks-label {
            font-size: 1.3rem;
            font-weight: 600;
            color: #e87c5e;
            background: #fff4ea;
            padding: 2px 14px;
            border-radius: 60px;
        }

        .cps-count {
            font-size: 1.6rem;
            font-weight: 700;
            color: #8b6b5b;
            background: white;
            display: inline-block;
            padding: 6px 20px;
            border-radius: 80px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
        }

        .cps-label {
            font-size: 0.95rem;
            font-weight: 600;
            color: #e87c5e;
            margin-right: 8px;
        }

        .click-circle {
            width: 260px;
            height: 260px;
            background: radial-gradient(circle at 30% 30%, #6fcf97, #27ae60);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 25px 35px rgba(39, 174, 96, 0.3), inset 0 -8px 0 rgba(0,0,0,0.1);
            transition: transform 0.08s linear, box-shadow 0.1s;
            touch-action: manipulation;
        }

        .click-circle:active {
            transform: scale(0.96);
            box-shadow: 0 15px 25px rgba(39, 174, 96, 0.3), inset 0 -4px 0 rgba(0,0,0,0.1);
        }

        .right-panel {
            flex: 1;
            min-width: 260px;
            background: #fffef7;
            border-radius: 40px;
            padding: 24px 20px;
            border: 1px solid #ffe0c4;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 24px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.05);
            align-self: stretch;
        }

        .action-btn {
            width: 100%;
            background: #e87c5e;
            border: none;
            border-radius: 60px;
            padding: 20px 0;
            font-size: 1.6rem;
            font-weight: 800;
            color: white;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 6px 15px rgba(232, 124, 94, 0.25);
            text-align: center;
        }

        .action-btn:active {
            transform: scale(0.96);
            background: #d46242;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #fffef7;
            border-radius: 48px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
            border: 1px solid #ffe0c4;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 2rem;
            cursor: pointer;
            color: #e87c5e;
            background: none;
            border: none;
            font-weight: bold;
            transition: transform 0.1s;
        }

        .close-modal:active {
            transform: scale(0.9);
        }

        .modal-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: #e87c5e;
            margin-bottom: 20px;
        }

        .settings-option {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #ffe0c4;
        }

        .settings-label {
            font-size: 1.2rem;
            font-weight: 600;
            color: #5a4a42;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toggle-switch {
            position: relative;
            width: 60px;
            height: 30px;
            background: #d4b5a8;
            border-radius: 30px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .toggle-switch.active {
            background: #e87c5e;
        }

        .toggle-slider {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            transition: transform 0.2s;
        }

        .toggle-switch.active .toggle-slider {
            transform: translateX(30px);
        }

        @media (max-width: 900px) {
            .game-container {
                flex-direction: column;
                align-items: stretch;
                padding: 16px;
            }
            .center-panel {
                order: 1;
            }
            .upgrades-panel {
                order: 2;
            }
            .right-panel {
                order: 3;
            }
            .click-circle {
                width: 200px;
                height: 200px;
            }
            .clicks-count {
                font-size: 2.5rem;
            }
            .clicks-count span:first-child {
                font-size: 2.5rem;
            }
            .clicks-label {
                font-size: 1rem;
                padding: 2px 10px;
            }
            .cps-count {
                font-size: 1.2rem;
                padding: 4px 16px;
            }
            .action-btn {
                padding: 16px 0;
                font-size: 1.4rem;
            }
        }

        @media (max-width: 480px) {
            .click-circle {
                width: 160px;
                height: 160px;
            }
            .clicks-count {
                font-size: 2rem;
            }
            .clicks-count span:first-child {
                font-size: 2rem;
            }
            .upgrades-title {
                font-size: 1.5rem;
            }
            .settings-btn {
                width: 38px;
                height: 38px;
                font-size: 1.3rem;
            }
            .action-btn {
                padding: 14px 0;
                font-size: 1.2rem;
            }
        }

        .heart-float {
            position: fixed;
            pointer-events: none;
            font-size: 1.8rem;
            z-index: 9999;
            filter: drop-shadow(0 0 3px #ffaa88);
            animation: floatUpFade 0.8s ease-out forwards;
        }

        @keyframes floatUpFade {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.6);
            }
            100% {
                opacity: 0;
                transform: translate(calc(-50% + var(--dx, 0px)), calc(-50% - 90px)) scale(1.2);
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="upgrades-panel">
        <div class="upgrades-header">
            <div class="upgrades-title">
                <span>✨</span> Улучшения <span>💖</span>
            </div>
            <button class="settings-btn" id="settingsBtn">⚙️</button>
        </div>
        <div class="upgrade-card">
            <div class="upgrade-name">
                <span>🤝</span> Сила клика
            </div>
            <div class="upgrade-desc">
                Каждое нажатие приносит на +1 клик больше.
            </div>
            <div class="upgrade-stats">
                <span class="upgrade-level" id="clickUpgradeLevel">Уровень: 0</span>
                <span class="upgrade-price" id="clickUpgradePrice">200 ❤️</span>
            </div>
            <button class="buy-btn" id="buyClickUpgradeBtn">Купить</button>
        </div>

        <div class="upgrade-card">
            <div class="upgrade-name">
                <span>⏲️</span> Автокликер
            </div>
            <div class="upgrade-desc">
                Пассивно приносит +1 клик в секунду.
            </div>
            <div class="upgrade-stats">
                <span class="upgrade-level" id="cpsUpgradeLevel">Уровень: 0</span>
                <span class="upgrade-price" id="cpsUpgradePrice">200 ❤️</span>
            </div>
            <button class="buy-btn" id="buyCpsUpgradeBtn">Купить</button>
        </div>
        <div style="margin-top: 8px; font-size: 0.75rem; text-align: center; color:#c09b87;">
            💡 Цена удваивается после каждой покупки
        </div>
    </div>

    <div class="center-panel">
        <div class="stats">
            <div class="clicks-count">
                <span id="totalClicks">0</span>
                <span class="clicks-label">кликов</span>
            </div>
            <div class="cps-count">
                <span class="cps-label">⚡ кликов/сек</span>
                <span id="clicksPerSec">0</span>
            </div>
        </div>
        <div class="click-circle" id="mainClicker"></div>
    </div>

    <div class="right-panel">
        <button class="action-btn" id="inventoryBtn">📦 Инвентарь</button>
        <button class="action-btn" id="casesBtn">🎁 Кейсы</button>
    </div>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <button class="close-modal" id="closeModalBtn">✖</button>
        <div class="modal-title">⚙️ Настройки</div>
        <div class="settings-option">
            <div class="settings-label">
                <span>🔊</span> Звуки
            </div>
            <div class="toggle-switch" id="soundToggle">
                <div class="toggle-slider"></div>
            </div>
        </div>
        <div class="settings-option">
            <div class="settings-label">
                <span>🎵</span> Музыка
            </div>
            <div class="toggle-switch" id="musicToggle">
                <div class="toggle-slider"></div>
            </div>
        </div>
    </div>
</div>

<script>
    let totalClicks = 0;
    let clickBonus = 0;
    let passiveIncome = 0;
    let clickUpgradeLevel = 0;
    let cpsUpgradeLevel = 0;
    let currentClickPrice = 200;
    let currentCpsPrice = 200;
    let clickTimestamps = [];
    let audioContext = null;
    let musicBuffer = null;
    let isMusicPlaying = false;
    let musicSource = null;
    let musicGainNode = null;
    
    let soundsEnabled = true;
    let musicEnabled = true;
    
    const totalSpan = document.getElementById('totalClicks');
    const cpsSpan = document.getElementById('clicksPerSec');
    const clickUpgradeLevelSpan = document.getElementById('clickUpgradeLevel');
    const clickUpgradePriceSpan = document.getElementById('clickUpgradePrice');
    const cpsUpgradeLevelSpan = document.getElementById('cpsUpgradeLevel');
    const cpsUpgradePriceSpan = document.getElementById('cpsUpgradePrice');
    const buyClickBtn = document.getElementById('buyClickUpgradeBtn');
    const buyCpsBtn = document.getElementById('buyCpsUpgradeBtn');
    const mainClicker = document.getElementById('mainClicker');
    const settingsBtn = document.getElementById('settingsBtn');
    const settingsModal = document.getElementById('settingsModal');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const inventoryBtn = document.getElementById('inventoryBtn');
    const casesBtn = document.getElementById('casesBtn');
    const soundToggle = document.getElementById('soundToggle');
    const musicToggle = document.getElementById('musicToggle');
    
    function initAudio() {
        if (!audioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            createBackgroundMusic();
        }
        if (audioContext.state === 'suspended' && musicEnabled) {
            audioContext.resume();
        }
    }
    
    function createBackgroundMusic() {
        const sampleRate = audioContext.sampleRate;
        const duration = 12;
        const length = sampleRate * duration;
        const buffer = audioContext.createBuffer(2, length, sampleRate);
        
        for (let ch = 0; ch < 2; ch++) {
            const data = buffer.getChannelData(ch);
            for (let i = 0; i < length; i++) {
                const t = i / sampleRate;
                let value = 0;
                const chords = [
                    { notes: [261.63, 329.63, 392.00], start: 0, length: 4 },
                    { notes: [293.66, 349.23, 440.00], start: 4, length: 4 },
                    { notes: [329.63, 392.00, 493.88], start: 8, length: 4 }
                ];
                
                for (const chord of chords) {
                    if (t >= chord.start && t < chord.start + chord.length) {
                        for (const freq of chord.notes) {
                            value += Math.sin(2 * Math.PI * freq * t) * 0.12;
                        }
                    }
                }
                const melody = Math.sin(2 * Math.PI * 523.25 * t) * 0.08 * Math.sin(2 * Math.PI * 1.5 * t);
                value += melody;
                const bass = Math.sin(2 * Math.PI * 130.81 * t) * 0.1 * (Math.sin(2 * Math.PI * 1 * t) * 0.5 + 0.5);
                value += bass;
                const envelope = Math.exp(-t * 0.3) * 0.8 + 0.2;
                const lfo = Math.sin(2 * Math.PI * 0.4 * t) * 0.04;
                data[i] = (value + lfo) * envelope * 0.5;
            }
        }
        musicBuffer = buffer;
    }
    
    function playBackgroundMusic() {
        if (!audioContext || !musicBuffer || !musicEnabled || isMusicPlaying) return;
        if (musicSource) {
            try {
                musicSource.stop();
            } catch(e) {}
        }
        musicSource = audioContext.createBufferSource();
        musicSource.buffer = musicBuffer;
        musicSource.loop = true;
        musicGainNode = audioContext.createGain();
        musicGainNode.gain.value = 0.28;
        musicSource.connect(musicGainNode);
        musicGainNode.connect(audioContext.destination);
        musicSource.start();
        isMusicPlaying = true;
    }
    
    function stopBackgroundMusic() {
        if (musicSource) {
            try {
                musicSource.stop();
            } catch(e) {}
            musicSource = null;
        }
        isMusicPlaying = false;
    }
    
    function playClickSound() {
        if (!soundsEnabled) return;
        if (!audioContext) {
            initAudio();
        }
        if (!audioContext) return;
        const now = audioContext.currentTime;
        const gainNode = audioContext.createGain();
        gainNode.gain.value = 0.12;
        gainNode.connect(audioContext.destination);
        
        const osc = audioContext.createOscillator();
        osc.frequency.value = 880;
        osc.type = 'triangle';
        osc.connect(gainNode);
        osc.start();
        
        const osc2 = audioContext.createOscillator();
        osc2.frequency.value = 540;
        osc2.type = 'sine';
        osc2.connect(gainNode);
        osc2.start(now + 0.015);
        
        gainNode.gain.exponentialRampToValueAtTime(0.00001, now + 0.12);
        osc.stop(now + 0.1);
        osc2.stop(now + 0.1);
    }
    
    function playPurchaseSound() {
        if (!soundsEnabled) return;
        if (!audioContext) {
            initAudio();
        }
        if (!audioContext) return;
        const now = audioContext.currentTime;
        const gainNode = audioContext.createGain();
        gainNode.gain.value = 0.18;
        gainNode.connect(audioContext.destination);
        
        const notes = [523.25, 659.25, 783.99, 1046.50];
        notes.forEach((freq, index) => {
            const osc = audioContext.createOscillator();
            osc.frequency.value = freq;
            osc.type = 'sine';
            osc.connect(gainNode);
            osc.start(now + index * 0.08);
            osc.stop(now + index * 0.08 + 0.2);
        });
        
        gainNode.gain.exponentialRampToValueAtTime(0.00001, now + 0.5);
    }
    
    function updateCPSDisplay() {
        const now = Date.now();
        clickTimestamps = clickTimestamps.filter(ts => now - ts < 1000);
        const activeCPS = clickTimestamps.length;
        const totalCPS = passiveIncome + activeCPS;
        cpsSpan.innerText = totalCPS;
    }
    
    function saveGame() {
        const saveData = {
            totalClicks: totalClicks,
            clickBonus: clickBonus,
            passiveIncome: passiveIncome,
            clickUpgradeLevel: clickUpgradeLevel,
            cpsUpgradeLevel: cpsUpgradeLevel,
            currentClickPrice: currentClickPrice,
            currentCpsPrice: currentCpsPrice,
            soundsEnabled: soundsEnabled,
            musicEnabled: musicEnabled
        };
        localStorage.setItem('clickerSave', JSON.stringify(saveData));
    }
    
    function loadGame() {
        const saved = localStorage.getItem('clickerSave');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                totalClicks = data.totalClicks || 0;
                clickBonus = data.clickBonus || 0;
                passiveIncome = data.passiveIncome || 0;
                clickUpgradeLevel = data.clickUpgradeLevel || 0;
                cpsUpgradeLevel = data.cpsUpgradeLevel || 0;
                currentClickPrice = data.currentClickPrice || 200;
                currentCpsPrice = data.currentCpsPrice || 200;
                soundsEnabled = data.soundsEnabled !== undefined ? data.soundsEnabled : true;
                musicEnabled = data.musicEnabled !== undefined ? data.musicEnabled : true;
            } catch(e) {}
        }
        updateToggleUI();
    }
    
    function updateToggleUI() {
        if (soundsEnabled) {
            soundToggle.classList.add('active');
        } else {
            soundToggle.classList.remove('active');
        }
        if (musicEnabled) {
            musicToggle.classList.add('active');
        } else {
            musicToggle.classList.remove('active');
        }
    }
    
    function addClicks(baseAmount = 1, fromPassive = false) {
        if (!fromPassive) {
            clickTimestamps.push(Date.now());
            updateCPSDisplay();
            playClickSound();
        }
        let gained = baseAmount;
        if (!fromPassive) {
            gained = baseAmount + clickBonus;
        }
        totalClicks += gained;
        updateUI();
        updateCPSDisplay();
        saveGame();
        return gained;
    }
    
    function updateUI() {
        totalSpan.innerText = Math.floor(totalClicks);
        clickUpgradeLevelSpan.innerText = `Уровень: ${clickUpgradeLevel}`;
        cpsUpgradeLevelSpan.innerText = `Уровень: ${cpsUpgradeLevel}`;
        clickUpgradePriceSpan.innerText = `${currentClickPrice} ❤️`;
        cpsUpgradePriceSpan.innerText = `${currentCpsPrice} ❤️`;
        
        if (totalClicks >= currentClickPrice) {
            buyClickBtn.classList.remove('disabled');
            buyClickBtn.disabled = false;
        } else {
            buyClickBtn.classList.add('disabled');
            buyClickBtn.disabled = true;
        }
        
        if (totalClicks >= currentCpsPrice) {
            buyCpsBtn.classList.remove('disabled');
            buyCpsBtn.disabled = false;
        } else {
            buyCpsBtn.classList.add('disabled');
            buyCpsBtn.disabled = true;
        }
    }
    
    function buyClickUpgrade() {
        if (totalClicks >= currentClickPrice) {
            totalClicks -= currentClickPrice;
            clickUpgradeLevel++;
            clickBonus = clickUpgradeLevel;
            currentClickPrice *= 2;
            updateUI();
            saveGame();
            playPurchaseSound();
            showFloatingMessage("✨ +1 к силе клика ✨", "#e87c5e");
        } else {
            showFloatingMessage("💔 Не хватает кликов 💔", "#d46242");
        }
    }
    
    function buyCpsUpgrade() {
        if (totalClicks >= currentCpsPrice) {
            totalClicks -= currentCpsPrice;
            cpsUpgradeLevel++;
            passiveIncome = cpsUpgradeLevel;
            currentCpsPrice *= 2;
            updateUI();
            saveGame();
            playPurchaseSound();
            showFloatingMessage("💓 +1 клик/сек 💓", "#e87c5e");
        } else {
            showFloatingMessage("💔 Не хватает кликов 💔", "#d46242");
        }
    }
    
    function showFloatingMessage(msg, color) {
        const div = document.createElement('div');
        div.innerText = msg;
        div.style.position = 'fixed';
        div.style.bottom = '30%';
        div.style.left = '50%';
        div.style.transform = 'translateX(-50%)';
        div.style.backgroundColor = 'rgba(0,0,0,0.8)';
        div.style.color = color;
        div.style.padding = '10px 22px';
        div.style.borderRadius = '50px';
        div.style.fontWeight = 'bold';
        div.style.fontSize = '1.1rem';
        div.style.zIndex = '10000';
        div.style.whiteSpace = 'nowrap';
        div.style.backdropFilter = 'blur(6px)';
        div.style.fontFamily = 'inherit';
        div.style.pointerEvents = 'none';
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 900);
    }
    
    function createHeartExplosion(clientX, clientY) {
        const heartsCount = Math.floor(Math.random() * 5) + 3;
        for (let i = 0; i < heartsCount; i++) {
            const heart = document.createElement('div');
            heart.classList.add('heart-float');
            const icons = ['❤️', '💖', '💗', '💓', '💕', '💘'];
            heart.innerText = icons[Math.floor(Math.random() * icons.length)];
            const size = Math.random() * 24 + 18;
            heart.style.fontSize = `${size}px`;
            const offX = (Math.random() - 0.5) * 70;
            const offY = (Math.random() - 0.5) * 50;
            heart.style.left = `${clientX + offX}px`;
            heart.style.top = `${clientY + offY}px`;
            heart.style.setProperty('--dx', `${(Math.random() - 0.5) * 60}px`);
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 800);
        }
    }
    
    function onMainClick(event) {
        let clientX, clientY;
        if (event.touches) {
            const touch = event.touches[0];
            clientX = touch.clientX;
            clientY = touch.clientY;
            event.preventDefault();
        } else {
            clientX = event.clientX;
            clientY = event.clientY;
        }
        
        const gained = addClicks(1, false);
        createHeartExplosion(clientX, clientY);
        
        if (window.navigator && window.navigator.vibrate) {
            window.navigator.vibrate(30);
        }
        
        const plus = document.createElement('div');
        plus.innerText = `+${gained}`;
        plus.style.position = 'fixed';
        plus.style.left = `${clientX - 15}px`;
        plus.style.top = `${clientY - 35}px`;
        plus.style.fontSize = '1.7rem';
        plus.style.fontWeight = 'bold';
        plus.style.color = '#27ae60';
        plus.style.textShadow = '0 0 5px white';
        plus.style.pointerEvents = 'none';
        plus.style.zIndex = '9998';
        plus.style.transition = 'transform 0.3s ease-out, opacity 0.4s';
        document.body.appendChild(plus);
        setTimeout(() => {
            plus.style.transform = 'translateY(-40px)';
            plus.style.opacity = '0';
            setTimeout(() => plus.remove(), 400);
        }, 10);
    }
    
    function startPassiveIncome() {
        setInterval(() => {
            if (passiveIncome > 0) {
                totalClicks += passiveIncome;
                updateUI();
                updateCPSDisplay();
                saveGame();
            }
        }, 1000);
    }
    
    async function startMusicAutomatically() {
        if (!musicEnabled) return;
        initAudio();
        if (audioContext) {
            await audioContext.resume();
            playBackgroundMusic();
        }
    }
    
    function toggleSounds() {
        soundsEnabled = !soundsEnabled;
        updateToggleUI();
        saveGame();
        showFloatingMessage(soundsEnabled ? "🔊 Звуки включены" : "🔇 Звуки выключены", "#e87c5e");
    }
    
    function toggleMusic() {
        musicEnabled = !musicEnabled;
        updateToggleUI();
        saveGame();
        if (musicEnabled) {
            startMusicAutomatically();
            showFloatingMessage("🎵 Музыка включена", "#e87c5e");
        } else {
            stopBackgroundMusic();
            showFloatingMessage("⏸️ Музыка выключена", "#e87c5e");
        }
    }
    
    function initGame() {
        loadGame();
        updateUI();
        updateCPSDisplay();
        startPassiveIncome();
        
        buyClickBtn.onclick = (e) => {
            e.stopPropagation();
            buyClickUpgrade();
        };
        buyCpsBtn.onclick = (e) => {
            e.stopPropagation();
            buyCpsUpgrade();
        };
        
        settingsBtn.onclick = (e) => {
            e.stopPropagation();
            settingsModal.style.display = 'flex';
        };
        
        closeModalBtn.onclick = () => {
            settingsModal.style.display = 'none';
        };
        
        inventoryBtn.onclick = () => {
            showFloatingMessage("📦 Инвентарь скоро будет доступен!", "#e87c5e");
        };
        
        casesBtn.onclick = () => {
            showFloatingMessage("🎁 Кейсы откроются в следующем обновлении!", "#e87c5e");
        };
        
        soundToggle.onclick = (e) => {
            e.stopPropagation();
            toggleSounds();
        };
        
        musicToggle.onclick = (e) => {
            e.stopPropagation();
            toggleMusic();
        };
        
        window.onclick = (e) => {
            if (e.target === settingsModal) {
                settingsModal.style.display = 'none';
            }
        };
        
        mainClicker.onclick = (e) => {
            onMainClick(e);
        };
        mainClicker.ontouchstart = (e) => {
            e.preventDefault();
            onMainClick(e);
        };
        
        setInterval(() => {
            updateCPSDisplay();
        }, 300);
        
        startMusicAutomatically();
    }
    
    initGame();
</script>
</body>
</html>
